name: "Automated Release"

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: install dependencies
        run: npm install

      - name: release
        env:
          GITHUB_TOKEN: ${{ secrets.LATTICE_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: npx semantic-release
