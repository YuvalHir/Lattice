name: "Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: Generate Changelog
        id: build_changelog
        uses: actions/github-script@v7
        with:
          script: |
            const currentTag = context.ref.replace('refs/tags/', '');
            const previousTag = `v${process.env.PREVIOUS_VERSION || '0.1.6'}`;

            const { data: comparison } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: previousTag,
              head: currentTag,
            });

            const conventionalCommits = {
              feat: [],
              fix: [],
              perf: [],
              refactor: [],
              docs: [],
              ci: [],
              style: [],
              chore: [],
              other: [],
            };

            for (const commit of comparison.commits) {
              const message = commit.commit.message.split('\n')[0];
              const match = message.match(/^(feat|fix|perf|refactor|docs|ci|style|chore)(\([^)]+\))?:\s*(.*)/);
              if (match) {
                const [, type, , desc] = match;
                conventionalCommits[type].push({ message, sha: commit.sha.substring(0, 7) });
              } else {
                conventionalCommits.other.push({ message, sha: commit.sha.substring(0, 7) });
              }
            }

            const sections = [];

            const categoryMap = {
              feat: '🚀 Features',
              fix: '🐛 Fixes',
              perf: '⚡ Performance',
              refactor: '🧱 Refactors',
              docs: '📖 Documentation',
              ci: '⚙️ CI/CD',
              style: '🎨 Style & Themes',
              chore: '📦 Dependencies',
              other: '📝 Other Changes',
            };

            for (const [type, title] of Object.entries(categoryMap)) {
              const items = conventionalCommits[type];
              if (items.length > 0) {
                const lines = items.map(c => `- ${c.message} (${c.sha})`).join('\n');
                sections.push(`### ${title}\n\n${lines}`);
              }
            }

            const changelog = sections.length > 0
              ? sections.join('\n\n')
              : 'No changes detected.';

            core.setOutput('changelog', changelog);

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Lattice ${{ github.ref_name }}"
          releaseBody: ${{ steps.build_changelog.outputs.changelog }}
          releaseDraft: false
          prerelease: false
